name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs previos del mismo branch al pushear nuevo commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Placeholders para vars que valida Zod en `src/env.ts`. El build estático
    # de Next.js no las usa en runtime; solo necesitamos pasar la validación.
    # Cuando T-012 monte signup/login, reemplazar Supabase keys por GitHub
    # Secrets reales. Cuando T-010 monte Vercel deploy, agregar SENTRY_AUTH_TOKEN
    # como secret real para subir source maps. Hoy: enabled: NODE_ENV ===
    # 'production' en cada sentry.*.config.ts hace que estos placeholders no
    # envíen nada a Sentry desde CI.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      NEXT_PUBLIC_SENTRY_DSN: https://placeholder@o0.ingest.sentry.io/0
      SENTRY_ORG: placeholder-org
      SENTRY_PROJECT: placeholder-project
      # Site URL placeholder — el .default() del schema Zod cubre si se omite,
      # pero lo seteamos explícito para que sitemap.xml/robots.txt generados en
      # CI no tengan el default hardcodeado. T-010 lo reemplaza por el dominio
      # real cuando Vercel deploye a prod.
      NEXT_PUBLIC_SITE_URL: https://placeholder.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # IMPORTANTE: pnpm va ANTES que setup-node. setup-node@v5 detecta el
      # packageManager field de package.json e intenta hacer caching automático
      # de pnpm, lo cual requiere pnpm en PATH. Si setup-node corre primero,
      # falla con "Unable to locate executable file: pnpm".
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + component tests
        run: pnpm test

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build

      # Defensa en profundidad sobre `import 'server-only'` en src/env.ts y
      # src/shared/supabase/service-role.ts: si por bug futuro un Client
      # Component termina importando esas keys, este step rompe el CI.
      - name: Verify service_role not in client bundle
        run: |
          if grep -rE 'service_role|SUPABASE_SERVICE_ROLE_KEY' .next/static; then
            echo "::error::Server-only credenciales filtradas al bundle del cliente."
            exit 1
          fi
          echo "✅ Bundle del cliente limpio."

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (browsers may be cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results (videos/screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
