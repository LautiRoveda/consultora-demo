name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs previos del mismo branch al pushear nuevo commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Supabase keys vienen de GitHub Secrets (configuradas en T-018) — son
    # necesarias para que los tests E2E con sesión real (`auth-flows.spec.ts`)
    # creen users via admin.createUser + bypass de email rate limit.
    # Sentry sigue con placeholders: `enabled: NODE_ENV === 'production'` en
    # cada sentry.*.config.ts hace que no envíen nada a Sentry desde CI.
    # SITE_URL apunta a localhost:3000 (ver inline T-022.5-FU4 más abajo).
    # SENTRY_AUTH_TOKEN (source maps en Vercel) se gestiona desde Vercel, no acá.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SENTRY_DSN: https://placeholder@o0.ingest.sentry.io/0
      SENTRY_ORG: placeholder-org
      SENTRY_PROJECT: placeholder-project
      # T-022.5-FU4: el callback handler (/auth/callback) ahora lee
      # NEXT_PUBLIC_SITE_URL como base del redirect post-auth (ver
      # src/app/auth/callback/route.ts). En CI el server Next corre en
      # localhost:3000 vía playwright webServer (next start), así que el
      # placeholder no-resolvible anterior (https://placeholder.example.com)
      # rompía el E2E recovery flow con net::ERR_NAME_NOT_RESOLVED.
      # Sitemap/robots usan este mismo env pero no se exercitan en E2E.
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # T-020: env.ts valida ANTHROPIC_API_KEY al cargar (es required). El
      # build de Next la necesita aunque ningun test live pegue a la API —
      # los integration tests mockean el SDK (vi.mock) y los E2E NO disparan
      # "Generar con IA" para evitar costo en CI.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # T-031: env.ts valida RESEND_API_KEY + RESEND_FROM_ADDRESS +
      # INTERNAL_CRON_SECRET. Placeholders alcanzan en CI: los integration
      # tests mockean Resend SDK (vi.mock @/shared/notifications/resend) y
      # el endpoint dispatcher se invoca directo desde el test sin pegarle
      # al cron real. El secret de Vault tampoco se toca (los tests usan
      # set_cron_vault_secret helper allowlisted). Valores reales viven
      # en EasyPanel + Vault, configurados por Lautaro post-merge
      # (docs/operations/resend-setup.md).
      RESEND_API_KEY: re_placeholder_ci_does_not_call_resend
      RESEND_FROM_ADDRESS: placeholder-ci@example.com
      INTERNAL_CRON_SECRET: ci_placeholder_secret_32_chars_minimum_aaaaaa
      # T-033: env.ts valida TELEGRAM_BOT_TOKEN (min 40) +
      # TELEGRAM_BOT_USERNAME (regex a-zA-Z0-9_) + TELEGRAM_WEBHOOK_SECRET
      # (min 32). Placeholders alcanzan en CI: los integration tests
      # mockean el módulo bot-client (vi.mock @/shared/telegram/bot-client)
      # y el webhook se invoca directo desde el test con header secret
      # válido. Valores reales viven en EasyPanel, configurados por
      # Lautaro post-merge (docs/operations/telegram-setup.md).
      TELEGRAM_BOT_TOKEN: ci_placeholder_telegram_bot_token_40_chars_aaa
      TELEGRAM_BOT_USERNAME: consultorademo_ci_bot
      TELEGRAM_WEBHOOK_SECRET: ci_placeholder_telegram_webhook_secret_32_chars
      # T-034: env.ts valida VAPID_PRIVATE_KEY (min 40) +
      # NEXT_PUBLIC_VAPID_PUBLIC_KEY (min 80) + VAPID_SUBJECT (regex mailto:|
      # https://, con default sensato). Placeholders alcanzan en CI: los
      # integration tests mockean web-push lib (vi.mock @/shared/push/web-push-client)
      # y el endpoint subscribe/unsubscribe se invoca directo del test.
      # Valores reales viven en EasyPanel, generados UNA VEZ por Lautaro
      # post-merge con `npx web-push generate-vapid-keys`
      # (docs/operations/push-setup.md).
      VAPID_PRIVATE_KEY: ci_placeholder_vapid_private_key_44_chars_b64url_aaa
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci_placeholder_vapid_public_key_88_chars_b64url_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      VAPID_SUBJECT: mailto:ci-placeholder@example.com
      # T-081: rate limiting via Upstash Redis. Optional en src/env.ts.
      # NO seteamos vars en CI — los integration tests mockean el helper
      # @/shared/security/rate-limit con vi.mock, no pegan a Upstash real.
      # En prod ambas DEBEN estar en EasyPanel post-merge
      # (docs/operations/rate-limiting.md). Sin valores, el helper devuelve
      # noop stub que siempre allows — adecuado para CI donde el rate limit
      # no se ejercita end-to-end.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # IMPORTANTE: pnpm va ANTES que setup-node. setup-node@v5 detecta el
      # packageManager field de package.json e intenta hacer caching automático
      # de pnpm, lo cual requiere pnpm en PATH. Si setup-node corre primero,
      # falla con "Unable to locate executable file: pnpm".
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Node 22 LTS: necesario para `@supabase/realtime-js` que requiere
          # WebSocket nativo (en Node 20 falla con "Node.js 20 detected
          # without native WebSocket support"). El admin client de los
          # tests E2E lo dispara eagermente en el constructor.
          node-version: 22

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + component tests
        run: pnpm test

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build

      # Defensa en profundidad sobre `import 'server-only'` en src/env.ts y
      # src/shared/supabase/service-role.ts: si por bug futuro un Client
      # Component termina importando esas keys, este step rompe el CI.
      - name: Verify service_role not in client bundle
        run: |
          if grep -rE 'service_role|SUPABASE_SERVICE_ROLE_KEY' .next/static; then
            echo "::error::Server-only credenciales filtradas al bundle del cliente."
            exit 1
          fi
          echo "✅ Bundle del cliente limpio."

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (browsers may be cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results (videos/screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  # NOTA T-022.5: el deploy a VPS Hostinger se dispara **manualmente** desde
  # EasyPanel UI (Service consultora-demo → botón "Implementar") tras cada
  # merge a `main`. EasyPanel v2.30.0 Self-Hosted no expone Auto Deploy ni
  # webhook URL en la UI. Gate de CI verde: implícito por convención (no
  # clickear Implementar sin CI verde) + opcional branch protection rule.
  # Tracking de revisita en upgrade EasyPanel: T-022.5-FU3 (ADR-0007).
  # Ver `docs/technical/06-deployment.md` y `docs/adr/0007-vps-hostinger-easypanel.md`.
