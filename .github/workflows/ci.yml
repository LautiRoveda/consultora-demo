name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs previos del mismo branch al pushear nuevo commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # T-112: el job `ci` ya NO corre E2E (se mudaron al job `e2e-tests` aislado),
    # así que NO necesita secrets de prod. Solo buildea + verifica el bundle, y eso
    # solo requiere que Zod (env.ts) valide: NEXT_PUBLIC_SUPABASE_URL una URL bien
    # formada, las keys un string no vacío (min 1). Por eso TODAS las env son
    # placeholders, CERO `${{ secrets.* }}`: superficie mínima de secrets + los fork
    # PRs y Dependabot pueden correr `ci` sin acceso a secrets. El build no escribe a
    # ninguna DB ni pega a Anthropic (no hay test live acá; el step "Verify
    # service_role" busca un literal en el bundle, es independiente del valor).
    # Sentry: `enabled: NODE_ENV === 'production'` en sentry.*.config.ts → no envía
    # nada desde CI. SENTRY_AUTH_TOKEN (source maps) se gestiona en Vercel, no acá.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_placeholder_anon_key_ci_build_only_no_db
      SUPABASE_SERVICE_ROLE_KEY: ci_placeholder_srvrole_key_server_only_no_db_aa
      NEXT_PUBLIC_SENTRY_DSN: https://placeholder@o0.ingest.sentry.io/0
      SENTRY_ORG: placeholder-org
      SENTRY_PROJECT: placeholder-project
      # NEXT_PUBLIC_SITE_URL: lo usan robots.ts/sitemap.ts y el callback handler
      # para armar URLs absolutas. localhost:3000 es un placeholder válido para el
      # build de CI (Zod pide una URL bien formada); el valor real vive en EasyPanel.
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # T-020/T-112: env.ts valida ANTHROPIC_API_KEY al cargar (required). El build
      # la necesita pero NO le pega a la API (no hay test live en `ci`). Placeholder.
      ANTHROPIC_API_KEY: ci_placeholder_anthropic_ci_build_only_no_api_call
      # T-031: env.ts valida RESEND_API_KEY + RESEND_FROM_ADDRESS +
      # INTERNAL_CRON_SECRET. Placeholders alcanzan en CI: los integration
      # tests mockean Resend SDK (vi.mock @/shared/notifications/resend) y
      # el endpoint dispatcher se invoca directo desde el test sin pegarle
      # al cron real. El secret de Vault tampoco se toca (los tests usan
      # set_cron_vault_secret helper allowlisted). Valores reales viven
      # en EasyPanel + Vault, configurados por Lautaro post-merge
      # (docs/operations/resend-setup.md).
      RESEND_API_KEY: re_placeholder_ci_does_not_call_resend
      RESEND_FROM_ADDRESS: placeholder-ci@example.com
      INTERNAL_CRON_SECRET: ci_placeholder_secret_32_chars_minimum_aaaaaa
      # T-033: env.ts valida TELEGRAM_BOT_TOKEN (min 40) +
      # TELEGRAM_BOT_USERNAME (regex a-zA-Z0-9_) + TELEGRAM_WEBHOOK_SECRET
      # (min 32). Placeholders alcanzan en CI: los integration tests
      # mockean el módulo bot-client (vi.mock @/shared/telegram/bot-client)
      # y el webhook se invoca directo desde el test con header secret
      # válido. Valores reales viven en EasyPanel, configurados por
      # Lautaro post-merge (docs/operations/telegram-setup.md).
      TELEGRAM_BOT_TOKEN: ci_placeholder_telegram_bot_token_40_chars_aaa
      TELEGRAM_BOT_USERNAME: consultorademo_ci_bot
      TELEGRAM_WEBHOOK_SECRET: ci_placeholder_telegram_webhook_secret_32_chars
      # T-034: env.ts valida VAPID_PRIVATE_KEY (min 40) +
      # NEXT_PUBLIC_VAPID_PUBLIC_KEY (min 80) + VAPID_SUBJECT (regex mailto:|
      # https://, con default sensato). Placeholders alcanzan en CI: los
      # integration tests mockean web-push lib (vi.mock @/shared/push/web-push-client)
      # y el endpoint subscribe/unsubscribe se invoca directo del test.
      # Valores reales viven en EasyPanel, generados UNA VEZ por Lautaro
      # post-merge con `npx web-push generate-vapid-keys`
      # (docs/operations/push-setup.md).
      VAPID_PRIVATE_KEY: ci_placeholder_vapid_private_key_44_chars_b64url_aaa
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci_placeholder_vapid_public_key_88_chars_b64url_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      VAPID_SUBJECT: mailto:ci-placeholder@example.com
      # T-070: env.ts valida ARS_PRICE_MONTHLY (regex /^\d+$/) en build time —
      # required, sin default. Placeholder alcanza en CI: el módulo Pagos
      # (T-071+) no se ejercita end-to-end en CI (los integration tests del
      # schema ya cubren RLS + UNIQUE + audit sin necesidad de la var, y no
      # hay E2E contra Mercado Pago). Valor real vive en EasyPanel,
      # configurado por Lautaro post-merge (docs/adr/0008-pagos-mercadopago-
      # subscriptions.md sección "Pricing").
      ARS_PRICE_MONTHLY: '3000000'
      # T-071: env.ts valida MP_ACCESS_TOKEN (min 40) + MP_WEBHOOK_SECRET (min 32)
      # en build time — required, sin default. Placeholders alcanzan en CI: los
      # integration tests del webhook + actions mockean el módulo
      # @/shared/mercadopago/client con vi.mock, no pegan a la API real de MP.
      # Valores reales viven en EasyPanel, configurados por Lautaro post-merge
      # (docs/operations/mercadopago-setup.md futuro).
      MP_ACCESS_TOKEN: ci_placeholder_mercadopago_token_40_chars_minimum_aaaa
      MP_WEBHOOK_SECRET: ci_placeholder_mercadopago_webhook_secret_32_chars
      # T-073: trial gate enforcement. 'false' = gate ENFORCED. CI valida que el
      # gate funciona end-to-end (tests de billing-gate dependen de esto). En
      # EasyPanel prod debe quedar igualmente 'false'; 'true' sólo en .env.local
      # para dev.
      BILLING_GATE_DISABLED: 'false'
      # T-081: rate limiting via Upstash Redis. Optional en src/env.ts.
      # NO seteamos vars en CI — los integration tests mockean el helper
      # @/shared/security/rate-limit con vi.mock, no pegan a Upstash real.
      # En prod ambas DEBEN estar en EasyPanel post-merge
      # (docs/operations/rate-limiting.md). Sin valores, el helper devuelve
      # noop stub que siempre allows — adecuado para CI donde el rate limit
      # no se ejercita end-to-end.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # IMPORTANTE: pnpm va ANTES que setup-node. setup-node@v5 detecta el
      # packageManager field de package.json e intenta hacer caching automático
      # de pnpm, lo cual requiere pnpm en PATH. Si setup-node corre primero,
      # falla con "Unable to locate executable file: pnpm".
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Node 22 LTS: necesario para `@supabase/realtime-js` que requiere
          # WebSocket nativo (en Node 20 falla con "Node.js 20 detected
          # without native WebSocket support"). El admin client de los
          # tests E2E lo dispara eagermente en el constructor.
          node-version: 22

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + component tests
        run: pnpm test

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build

      # Defensa en profundidad sobre `import 'server-only'` en src/env.ts y
      # src/shared/supabase/service-role.ts: si por bug futuro un Client
      # Component termina importando esas keys, este step rompe el CI.
      - name: Verify service_role not in client bundle
        run: |
          if grep -rE 'service_role|SUPABASE_SERVICE_ROLE_KEY' .next/static; then
            echo "::error::Server-only credenciales filtradas al bundle del cliente."
            exit 1
          fi
          echo "✅ Bundle del cliente limpio."

  # T-111 F1: smoke de integration tests contra un Supabase LOCAL efímero (Docker
  # del runner). CERO secrets de prod — todas las env son placeholders para que
  # env.ts (Zod) valide al import; los servicios externos se mockean y el stack
  # Supabase es local. NUNCA toca la prod-linked DB (el script no usa --linked).
  integration-tests:
    name: Integration (Supabase local)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SENTRY_DSN: https://placeholder@o0.ingest.sentry.io/0
      SENTRY_ORG: placeholder-org
      SENTRY_PROJECT: placeholder-project
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      ANTHROPIC_API_KEY: ci_placeholder_anthropic_integration_mocks_sdk_aaaa
      RESEND_API_KEY: re_placeholder_ci_does_not_call_resend
      RESEND_FROM_ADDRESS: placeholder-ci@example.com
      INTERNAL_CRON_SECRET: ci_placeholder_secret_32_chars_minimum_aaaaaa
      TELEGRAM_BOT_TOKEN: ci_placeholder_telegram_bot_token_40_chars_aaa
      TELEGRAM_BOT_USERNAME: consultorademo_ci_bot
      TELEGRAM_WEBHOOK_SECRET: ci_placeholder_telegram_webhook_secret_32_chars
      VAPID_PRIVATE_KEY: ci_placeholder_vapid_private_key_44_chars_b64url_aaa
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci_placeholder_vapid_public_key_88_chars_b64url_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      VAPID_SUBJECT: mailto:ci-placeholder@example.com
      ARS_PRICE_MONTHLY: '3000000'
      MP_ACCESS_TOKEN: ci_placeholder_mercadopago_token_40_chars_minimum_aaaa
      MP_WEBHOOK_SECRET: ci_placeholder_mercadopago_webhook_secret_32_chars
      BILLING_GATE_DISABLED: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm test:integration` = scripts/test-integration-local.mjs:
      #   supabase start (Docker local) -> db reset -> status -o env -> vitest.
      # El supabase CLI viene del devDep (pnpm exec), misma versión que local.
      # Falla el job si la suite falla (el script propaga el exit code).
      - name: Integration tests (Supabase local efímero)
        run: pnpm test:integration

  # T-112: E2E (Playwright) contra un Supabase LOCAL efímero (Docker del runner),
  # espejo del job integration-tests (F1). CERO secrets de prod — todas las env son
  # placeholders que pasan la validación Zod de env.ts; las 3 keys de Supabase salen
  # del stack LOCAL (scripts/test-e2e-local.mjs vía `supabase status -o env`), NO de
  # secrets. El orquestador NO usa --linked: imposible tocar la DB de prod. Los
  # servicios externos no se pegan de verdad en los specs (AI mockeada con
  # page.route, push con addInitScript, Telegram/Resend/MP solo tocan DB/UI).
  # NOTA: arranca NO-required en branch protection hasta probar estabilidad (≥1
  # corrida verde). Marcarlo required es un cambio de settings del repo, no de acá.
  e2e-tests:
    name: E2E (Supabase local)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SENTRY_DSN: https://placeholder@o0.ingest.sentry.io/0
      SENTRY_ORG: placeholder-org
      SENTRY_PROJECT: placeholder-project
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # AI mockeada con page.route en los specs E2E (no pega a Anthropic), igual
      # que integration. Placeholder alcanza para que Zod (env.ts) valide.
      ANTHROPIC_API_KEY: ci_placeholder_anthropic_e2e_mocked_page_route_aaaa
      RESEND_API_KEY: re_placeholder_ci_does_not_call_resend
      RESEND_FROM_ADDRESS: placeholder-ci@example.com
      INTERNAL_CRON_SECRET: ci_placeholder_secret_32_chars_minimum_aaaaaa
      TELEGRAM_BOT_TOKEN: ci_placeholder_telegram_bot_token_40_chars_aaa
      TELEGRAM_BOT_USERNAME: consultorademo_ci_bot
      TELEGRAM_WEBHOOK_SECRET: ci_placeholder_telegram_webhook_secret_32_chars
      VAPID_PRIVATE_KEY: ci_placeholder_vapid_private_key_44_chars_b64url_aaa
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci_placeholder_vapid_public_key_88_chars_b64url_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      VAPID_SUBJECT: mailto:ci-placeholder@example.com
      ARS_PRICE_MONTHLY: '3000000'
      MP_ACCESS_TOKEN: ci_placeholder_mercadopago_token_40_chars_minimum_aaaa
      MP_WEBHOOK_SECRET: ci_placeholder_mercadopago_webhook_secret_32_chars
      # 'false' = gate de trial ENFORCED. billing-gate.spec valida el gate
      # end-to-end (banner trial vencido + create gated). Igual que integration.
      BILLING_GATE_DISABLED: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache .next con key PROPIA (`nextjs-e2e-`), NO la del job `ci`. El build de
      # `ci` hornea otra NEXT_PUBLIC_SUPABASE_URL y la webpack cache puede reusar
      # módulos con esa URL ya inlineada (footgun conocido de NEXT_PUBLIC + cache
      # persistente). Compartir la key arriesgaría que el build E2E hornee la URL de
      # `ci` (prod) en vez de 127.0.0.1:54321. Key aislada → el build E2E siempre
      # hornea la URL local; el gate de abajo lo verifica igual como red de seguridad.
      - name: Cache Next.js build (E2E, key aislada)
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-e2e-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-e2e-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (browsers may be cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Apuntá puppeteer-core (render de PDF server-side, src/shared/pdf/browser-pool.ts)
      # al Chromium que Playwright ya instaló. browser-pool.ts resuelve el binario con
      # `process.env.CHROMIUM_PATH ?? '/usr/bin/chromium-browser'`, y ubuntu-latest NO
      # garantiza ese fallback (playwright install deja el binario en ~/.cache/ms-playwright,
      # no en /usr/bin). Seteamos CHROMIUM_PATH a nivel job (GITHUB_ENV) → lo hereda el
      # `next start` del webServer de Playwright. Sin esto los specs de PDF tiran 500.
      - name: Resolver CHROMIUM_PATH para puppeteer-core (PDF server-side)
        run: |
          CHROMIUM_PATH="$(node -e "process.stdout.write(require('@playwright/test').chromium.executablePath())")"
          test -x "$CHROMIUM_PATH" || { echo "::error::No se resolvió un Chromium ejecutable: $CHROMIUM_PATH"; exit 1; }
          echo "CHROMIUM_PATH=$CHROMIUM_PATH" >> "$GITHUB_ENV"
          echo "CHROMIUM_PATH=$CHROMIUM_PATH"

      # `pnpm test:e2e:local` = scripts/test-e2e-local.mjs:
      #   supabase start (Docker local) -> db reset -> status -o env -> playwright.
      # El webServer (CI) buildea+corre la app heredando las 3 keys LOCALES, así que el
      # build SERVIDO (.next/server) queda horneado apuntando a 127.0.0.1:54321 (lo
      # verifica el gate de abajo). NUNCA usa --linked → imposible tocar prod. Falla el
      # job si la suite falla (el script propaga el exit code).
      - name: E2E tests (Supabase local efímero)
        run: pnpm test:e2e:local

      # GATE DURO (T-112): probamos que el build SERVIDO quedó horneado apuntando al
      # Supabase LOCAL y NO a prod. Verificado empíricamente (no es obvio):
      #  - NEXT_PUBLIC_SUPABASE_URL NO llega a .next/static. El browser client
      #    (src/shared/supabase/client.ts) es dead code (cero imports); toda la app usa
      #    el server client, así que la URL se inlina en .next/server (lo que sirve
      #    `next start`), no en el bundle del cliente. Por eso grepeamos .next/server.
      #  - Solo .js, NO .js.map: los source maps incluyen el código fuente, y un
      #    comentario en (print)/layout.tsx menciona el project-ref de prod → sin excluir
      #    los maps el negativo daría falso positivo.
      #  - Negativo (garantía real anti-contaminación): el project-ref de PROD
      #    (blijipnixnikaguojjee — público, ya está en ese comentario) NO debe aparecer en
      #    ningún .js servido. Un patrón genérico *.supabase.co NO sirve: el SDK @supabase
      #    trae URLs de ejemplo (example/realtime/xyzcompany.supabase.co) horneadas.
      #  - Positivo: la URL local (:54321) SÍ está en un .js servido.
      # Corre con `always()` porque "tests verdes" NO prueba aislamiento (un build con prod
      # podría correr los E2E contra prod y pasar igual). Si no hubo build, skip benigno
      # (el step E2E ya pintó el job rojo; no hay bundle que inspeccionar).
      - name: Gate horneado — el build servido apunta al Supabase LOCAL
        if: always()
        run: |
          if [ ! -d .next/server ]; then
            echo "::warning::.next/server no existe (el build no se completó); el step E2E ya falló. Skip del gate."
            exit 0
          fi
          if grep -rqF --include='*.js' 'blijipnixnikaguojjee' .next/server; then
            echo "::error::El build servido contiene el project-ref de PROD — NO se aisló, correría contra prod."
            grep -rlF --include='*.js' 'blijipnixnikaguojjee' .next/server | head -5
            exit 1
          fi
          if ! grep -rqE --include='*.js' '(127\.0\.0\.1|localhost):54321' .next/server; then
            echo "::error::El build servido NO contiene la URL del Supabase local (:54321) — el horneado falló o no se aisló."
            exit 1
          fi
          echo "✅ Aislamiento OK: build servido apunta al Supabase local (:54321), sin el project-ref de prod."

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results (videos/screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  # NOTA T-022.5: el deploy a VPS Hostinger se dispara **manualmente** desde
  # EasyPanel UI (Service consultora-demo → botón "Implementar") tras cada
  # merge a `main`. EasyPanel v2.30.0 Self-Hosted no expone Auto Deploy ni
  # webhook URL en la UI. Gate de CI verde: implícito por convención (no
  # clickear Implementar sin CI verde) + opcional branch protection rule.
  # Tracking de revisita en upgrade EasyPanel: T-022.5-FU3 (ADR-0007).
  # Ver `docs/technical/06-deployment.md` y `docs/adr/0007-vps-hostinger-easypanel.md`.
