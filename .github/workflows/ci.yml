name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs previos del mismo branch al pushear nuevo commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# T-154 S-1: least-privilege del GITHUB_TOKEN. Deny-all a nivel top — cada job
# declara abajo el mínimo que necesita (los jobs con checkout: contents: read;
# ci-passed: nada). Un step comprometido no puede escribir en el repo.
permissions: {}

jobs:
  ci:
    name: CI
    permissions:
      contents: read # T-154 S-1: solo lo que exige actions/checkout
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # T-112: el job `ci` ya NO corre E2E (se mudaron al job `e2e-tests` aislado),
    # así que NO necesita secrets de prod. Solo buildea + verifica el bundle, y eso
    # solo requiere que Zod (env.ts) valide: NEXT_PUBLIC_SUPABASE_URL una URL bien
    # formada, las keys un string no vacío (min 1). Por eso TODAS las env son
    # placeholders, CERO `${{ secrets.* }}`: superficie mínima de secrets + los fork
    # PRs y Dependabot pueden correr `ci` sin acceso a secrets. El build no escribe a
    # ninguna DB ni pega a Anthropic (no hay test live acá; el step "Verify
    # service_role" busca un literal en el bundle, es independiente del valor).
    # Sentry: `enabled: NODE_ENV === 'production'` en sentry.*.config.ts → no envía
    # nada desde CI. SENTRY_AUTH_TOKEN (source maps) se gestiona en Vercel, no acá.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_placeholder_anon_key_ci_build_only_no_db
      SUPABASE_SERVICE_ROLE_KEY: ci_placeholder_srvrole_key_server_only_no_db_aa
      NEXT_PUBLIC_SENTRY_DSN: https://placeholder@o0.ingest.sentry.io/0
      SENTRY_ORG: placeholder-org
      SENTRY_PROJECT: placeholder-project
      # NEXT_PUBLIC_SITE_URL: lo usan robots.ts/sitemap.ts y el callback handler
      # para armar URLs absolutas. localhost:3000 es un placeholder válido para el
      # build de CI (Zod pide una URL bien formada); el valor real vive en EasyPanel.
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # T-020/T-112: env.ts valida ANTHROPIC_API_KEY al cargar (required). El build
      # la necesita pero NO le pega a la API (no hay test live en `ci`). Placeholder.
      ANTHROPIC_API_KEY: ci_placeholder_anthropic_ci_build_only_no_api_call
      # T-031: env.ts valida RESEND_API_KEY + RESEND_FROM_ADDRESS +
      # INTERNAL_CRON_SECRET. Placeholders alcanzan en CI: los integration
      # tests mockean Resend SDK (vi.mock @/shared/notifications/resend) y
      # el endpoint dispatcher se invoca directo desde el test sin pegarle
      # al cron real. El secret de Vault tampoco se toca (los tests usan
      # set_cron_vault_secret helper allowlisted). Valores reales viven
      # en EasyPanel + Vault, configurados por Lautaro post-merge
      # (docs/operations/resend-setup.md).
      RESEND_API_KEY: re_placeholder_ci_does_not_call_resend
      RESEND_FROM_ADDRESS: placeholder-ci@example.com
      INTERNAL_CRON_SECRET: ci_placeholder_secret_32_chars_minimum_aaaaaa
      # T-033: env.ts valida TELEGRAM_BOT_TOKEN (min 40) +
      # TELEGRAM_BOT_USERNAME (regex a-zA-Z0-9_) + TELEGRAM_WEBHOOK_SECRET
      # (min 32). Placeholders alcanzan en CI: los integration tests
      # mockean el módulo bot-client (vi.mock @/shared/telegram/bot-client)
      # y el webhook se invoca directo desde el test con header secret
      # válido. Valores reales viven en EasyPanel, configurados por
      # Lautaro post-merge (docs/operations/telegram-setup.md).
      TELEGRAM_BOT_TOKEN: ci_placeholder_telegram_bot_token_40_chars_aaa
      TELEGRAM_BOT_USERNAME: consultorademo_ci_bot
      TELEGRAM_WEBHOOK_SECRET: ci_placeholder_telegram_webhook_secret_32_chars
      # T-034: env.ts valida VAPID_PRIVATE_KEY (min 40) +
      # NEXT_PUBLIC_VAPID_PUBLIC_KEY (min 80) + VAPID_SUBJECT (regex mailto:|
      # https://, con default sensato). Placeholders alcanzan en CI: los
      # integration tests mockean web-push lib (vi.mock @/shared/push/web-push-client)
      # y el endpoint subscribe/unsubscribe se invoca directo del test.
      # Valores reales viven en EasyPanel, generados UNA VEZ por Lautaro
      # post-merge con `npx web-push generate-vapid-keys`
      # (docs/operations/push-setup.md).
      VAPID_PRIVATE_KEY: ci_placeholder_vapid_private_key_44_chars_b64url_aaa
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci_placeholder_vapid_public_key_88_chars_b64url_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      VAPID_SUBJECT: mailto:ci-placeholder@example.com
      # T-070: env.ts valida ARS_PRICE_MONTHLY (regex /^\d+$/) en build time —
      # required, sin default. Placeholder alcanza en CI: el módulo Pagos
      # (T-071+) no se ejercita end-to-end en CI (los integration tests del
      # schema ya cubren RLS + UNIQUE + audit sin necesidad de la var, y no
      # hay E2E contra Mercado Pago). Valor real vive en EasyPanel,
      # configurado por Lautaro post-merge (docs/adr/0008-pagos-mercadopago-
      # subscriptions.md sección "Pricing").
      ARS_PRICE_MONTHLY: '3000000'
      # T-071: env.ts valida MP_ACCESS_TOKEN (min 40) + MP_WEBHOOK_SECRET (min 32)
      # en build time — required, sin default. Placeholders alcanzan en CI: los
      # integration tests del webhook + actions mockean el módulo
      # @/shared/mercadopago/client con vi.mock, no pegan a la API real de MP.
      # Valores reales viven en EasyPanel, configurados por Lautaro post-merge
      # (docs/operations/mercadopago-setup.md futuro).
      MP_ACCESS_TOKEN: ci_placeholder_mercadopago_token_40_chars_minimum_aaaa
      MP_WEBHOOK_SECRET: ci_placeholder_mercadopago_webhook_secret_32_chars
      # T-073: trial gate enforcement. 'false' = gate ENFORCED. CI valida que el
      # gate funciona end-to-end (tests de billing-gate dependen de esto). En
      # EasyPanel prod debe quedar igualmente 'false'; 'true' sólo en .env.local
      # para dev.
      BILLING_GATE_DISABLED: 'false'
      # T-081: rate limiting via Upstash Redis. Optional en src/env.ts.
      # NO seteamos vars en CI — los integration tests mockean el helper
      # @/shared/security/rate-limit con vi.mock, no pegan a Upstash real.
      # En prod ambas DEBEN estar en EasyPanel post-merge
      # (docs/operations/rate-limiting.md). Sin valores, el helper devuelve
      # noop stub que siempre allows — adecuado para CI donde el rate limit
      # no se ejercita end-to-end.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # T-155 S-4: zizmor artipacked — no persistir el token git (no hay git ops post-checkout)

      # IMPORTANTE: pnpm va ANTES que setup-node. setup-node@v5 detecta el
      # packageManager field de package.json e intenta hacer caching automático
      # de pnpm, lo cual requiere pnpm en PATH. Si setup-node corre primero,
      # falla con "Unable to locate executable file: pnpm".
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Node 22 LTS: necesario para `@supabase/realtime-js` que requiere
          # WebSocket nativo (en Node 20 falla con "Node.js 20 detected
          # without native WebSocket support"). El admin client de los
          # tests E2E lo dispara eagermente en el constructor.
          node-version-file: .nvmrc

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + component tests
        run: pnpm test

      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build

      # Defensa en profundidad sobre `import 'server-only'` en src/env.ts y
      # src/shared/supabase/service-role.ts: si por bug futuro un Client
      # Component termina importando esas keys, este step rompe el CI.
      - name: Verify service_role not in client bundle
        run: |
          if grep -rE 'service_role|SUPABASE_SERVICE_ROLE_KEY' .next/static; then
            echo "::error::Server-only credenciales filtradas al bundle del cliente."
            exit 1
          fi
          echo "✅ Bundle del cliente limpio."

  # T-111 F1: smoke de integration tests contra un Supabase LOCAL efímero (Docker
  # del runner). CERO secrets de prod — todas las env son placeholders para que
  # env.ts (Zod) valide al import; los servicios externos se mockean y el stack
  # Supabase es local. NUNCA toca la prod-linked DB (el script no usa --linked).
  integration-tests:
    name: Integration (Supabase local)
    permissions:
      contents: read # T-154 S-1: solo lo que exige actions/checkout
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SENTRY_DSN: https://placeholder@o0.ingest.sentry.io/0
      SENTRY_ORG: placeholder-org
      SENTRY_PROJECT: placeholder-project
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      ANTHROPIC_API_KEY: ci_placeholder_anthropic_integration_mocks_sdk_aaaa
      RESEND_API_KEY: re_placeholder_ci_does_not_call_resend
      RESEND_FROM_ADDRESS: placeholder-ci@example.com
      INTERNAL_CRON_SECRET: ci_placeholder_secret_32_chars_minimum_aaaaaa
      TELEGRAM_BOT_TOKEN: ci_placeholder_telegram_bot_token_40_chars_aaa
      TELEGRAM_BOT_USERNAME: consultorademo_ci_bot
      TELEGRAM_WEBHOOK_SECRET: ci_placeholder_telegram_webhook_secret_32_chars
      VAPID_PRIVATE_KEY: ci_placeholder_vapid_private_key_44_chars_b64url_aaa
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci_placeholder_vapid_public_key_88_chars_b64url_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      VAPID_SUBJECT: mailto:ci-placeholder@example.com
      ARS_PRICE_MONTHLY: '3000000'
      MP_ACCESS_TOKEN: ci_placeholder_mercadopago_token_40_chars_minimum_aaaa
      MP_WEBHOOK_SECRET: ci_placeholder_mercadopago_webhook_secret_32_chars
      BILLING_GATE_DISABLED: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # T-155 S-4: zizmor artipacked — no persistir el token git (no hay git ops post-checkout)

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # T-149: el gate de drift de db:types se mudó al job `types-gate` (abajo). Antes
      # vivía acá cargando un supabase start + db reset (~150s) para ~5s de trabajo
      # real; separarlo lo paraleliza (oculto bajo E2E) y deja este job solo con su
      # propia suite. `pnpm test:integration` hace su propio start+reset.
      # `pnpm test:integration` = scripts/test-integration-local.mjs:
      #   supabase start (con retry T-153) -> db reset -> status -o env -> vitest.
      # El supabase CLI viene del devDep (pnpm exec), misma versión que local.
      # Falla el job si la suite falla (el script propaga el exit code).
      - name: Integration tests (Supabase local efímero)
        run: pnpm test:integration

  # T-156 (auditoría CI/CD, Fase 5): gate de cobertura anti-REGRESIÓN. Corre los 3
  # projects (unit+component+integration) con coverage v8 en una sola pasada contra un
  # Supabase LOCAL efímero (igual aislamiento que integration-tests: CERO secrets de
  # prod, todo placeholder, los servicios externos se mockean, NUNCA --linked). vitest
  # aplica los thresholds de vitest.config.ts (branches+functions GLOBAL ≥72) y sale ≠0
  # si caen → este job rojo → ci-passed rojo. Lines/Statements NO gatean (contaminados
  # por ~210 .tsx que solo cubren los E2E, invisibles a v8). Job DEDICADO (corre en
  # paralelo, bajo el wall-clock del shard E2E): mantiene integration-tests como señal
  # pura sin instrumentación v8; el costo es que integration corre una 2ª vez acá.
  coverage:
    name: Coverage gate (branches + functions)
    permissions:
      contents: read # T-154 S-1: solo lo que exige actions/checkout
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SENTRY_DSN: https://placeholder@o0.ingest.sentry.io/0
      SENTRY_ORG: placeholder-org
      SENTRY_PROJECT: placeholder-project
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      ANTHROPIC_API_KEY: ci_placeholder_anthropic_integration_mocks_sdk_aaaa
      RESEND_API_KEY: re_placeholder_ci_does_not_call_resend
      RESEND_FROM_ADDRESS: placeholder-ci@example.com
      INTERNAL_CRON_SECRET: ci_placeholder_secret_32_chars_minimum_aaaaaa
      TELEGRAM_BOT_TOKEN: ci_placeholder_telegram_bot_token_40_chars_aaa
      TELEGRAM_BOT_USERNAME: consultorademo_ci_bot
      TELEGRAM_WEBHOOK_SECRET: ci_placeholder_telegram_webhook_secret_32_chars
      VAPID_PRIVATE_KEY: ci_placeholder_vapid_private_key_44_chars_b64url_aaa
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci_placeholder_vapid_public_key_88_chars_b64url_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      VAPID_SUBJECT: mailto:ci-placeholder@example.com
      ARS_PRICE_MONTHLY: '3000000'
      MP_ACCESS_TOKEN: ci_placeholder_mercadopago_token_40_chars_minimum_aaaa
      MP_WEBHOOK_SECRET: ci_placeholder_mercadopago_webhook_secret_32_chars
      BILLING_GATE_DISABLED: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # T-155 S-4: no persistir el token git (no hay git ops post-checkout)

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # scripts/test-coverage-local.mjs: supabase start (retry T-153) -> db reset ->
      # status -o env -> `vitest run --coverage --no-file-parallelism` (3 projects).
      # vitest aplica los thresholds → falla acá si branches/functions caen bajo 72.
      - name: Coverage gate (3 projects, Supabase local efímero)
        run: pnpm test:coverage:local

      # Reporte HTML para debug. continue-on-error: el upload NUNCA tumba el gate
      # (el gate es el step de arriba). No va al needs de ci-passed: es reporte.
      - name: Upload coverage HTML report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # T-112: E2E (Playwright) contra un Supabase LOCAL efímero (Docker del runner),
  # espejo del job integration-tests (F1). CERO secrets de prod — todas las env son
  # placeholders que pasan la validación Zod de env.ts; las 3 keys de Supabase salen
  # del stack LOCAL (scripts/test-e2e-local.mjs vía `supabase status -o env`), NO de
  # secrets. El orquestador NO usa --linked: imposible tocar la DB de prod. Los
  # servicios externos no se pegan de verdad en los specs (AI mockeada con
  # page.route, push con addInitScript, Telegram/Resend/MP solo tocan DB/UI).
  # NOTA: el gating va por `ci-passed` (único required del ruleset desde T-150); este
  # job lo agrega vía `needs`. La flakiness inicial se resolvió (T-113d).
  e2e-tests:
    # T-149: sharding en 3 instancias paralelas. El display name lleva el índice
    # ("E2E shard 1/3"); los display names por-job ya NO son required en el ruleset
    # (T-150: `CI passed` es el único required), así que renombrar no toca branch
    # protection. `ci-passed` (needs) espera a las 3 instancias y agrega rojo si
    # cualquiera falla. Cada shard levanta su PROPIO Supabase efímero (runners de
    # matrix aislados; el orquestador ya hace start+reset). Cero --linked.
    name: E2E shard ${{ matrix.shard }}/3
    # T-154 S-1: contents: read alcanza. upload-artifact (abajo) sube vía el
    # Artifact Service con ACTIONS_RUNTIME_TOKEN, NO el GITHUB_TOKEN → no requiere
    # actions: write ni otro permiso de repo.
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # fail-fast: false → un shard rojo NO cancela a los otros (queremos el
      # resultado completo de los 3 para debug; el gate lo aplica ci-passed).
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    env:
      NEXT_PUBLIC_SENTRY_DSN: https://placeholder@o0.ingest.sentry.io/0
      SENTRY_ORG: placeholder-org
      SENTRY_PROJECT: placeholder-project
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # AI mockeada con page.route en los specs E2E (no pega a Anthropic), igual
      # que integration. Placeholder alcanza para que Zod (env.ts) valide.
      ANTHROPIC_API_KEY: ci_placeholder_anthropic_e2e_mocked_page_route_aaaa
      RESEND_API_KEY: re_placeholder_ci_does_not_call_resend
      RESEND_FROM_ADDRESS: placeholder-ci@example.com
      INTERNAL_CRON_SECRET: ci_placeholder_secret_32_chars_minimum_aaaaaa
      TELEGRAM_BOT_TOKEN: ci_placeholder_telegram_bot_token_40_chars_aaa
      TELEGRAM_BOT_USERNAME: consultorademo_ci_bot
      TELEGRAM_WEBHOOK_SECRET: ci_placeholder_telegram_webhook_secret_32_chars
      VAPID_PRIVATE_KEY: ci_placeholder_vapid_private_key_44_chars_b64url_aaa
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci_placeholder_vapid_public_key_88_chars_b64url_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      VAPID_SUBJECT: mailto:ci-placeholder@example.com
      ARS_PRICE_MONTHLY: '3000000'
      MP_ACCESS_TOKEN: ci_placeholder_mercadopago_token_40_chars_minimum_aaaa
      MP_WEBHOOK_SECRET: ci_placeholder_mercadopago_webhook_secret_32_chars
      # 'false' = gate de trial ENFORCED. billing-gate.spec valida el gate
      # end-to-end (banner trial vencido + create gated). Igual que integration.
      BILLING_GATE_DISABLED: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # T-155 S-4: zizmor artipacked — no persistir el token git (no hay git ops post-checkout)

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache .next con key PROPIA (`nextjs-e2e-`), NO la del job `ci`. El build de
      # `ci` hornea otra NEXT_PUBLIC_SUPABASE_URL y la webpack cache puede reusar
      # módulos con esa URL ya inlineada (footgun conocido de NEXT_PUBLIC + cache
      # persistente). Compartir la key arriesgaría que el build E2E hornee la URL de
      # `ci` (prod) en vez de 127.0.0.1:54321. Key aislada → el build E2E siempre
      # hornea la URL local; el gate de abajo lo verifica igual como red de seguridad.
      - name: Cache Next.js build (E2E, key aislada)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-e2e-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-e2e-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (browsers may be cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Apuntá puppeteer-core (render de PDF server-side, src/shared/pdf/browser-pool.ts)
      # al Chromium que Playwright ya instaló. browser-pool.ts resuelve el binario con
      # `process.env.CHROMIUM_PATH ?? '/usr/bin/chromium-browser'`, y ubuntu-latest NO
      # garantiza ese fallback (playwright install deja el binario en ~/.cache/ms-playwright,
      # no en /usr/bin). Seteamos CHROMIUM_PATH a nivel job (GITHUB_ENV) → lo hereda el
      # `next start` del webServer de Playwright. Sin esto los specs de PDF tiran 500.
      - name: Resolver CHROMIUM_PATH para puppeteer-core (PDF server-side)
        run: |
          CHROMIUM_PATH="$(node -e "process.stdout.write(require('@playwright/test').chromium.executablePath())")"
          test -x "$CHROMIUM_PATH" || { echo "::error::No se resolvió un Chromium ejecutable: $CHROMIUM_PATH"; exit 1; }
          echo "CHROMIUM_PATH=$CHROMIUM_PATH" >> "$GITHUB_ENV"
          echo "CHROMIUM_PATH=$CHROMIUM_PATH"

      # scripts/test-e2e-local.mjs:
      #   supabase start (con retry T-153) -> db reset -> status -o env -> playwright.
      # El webServer (CI) buildea+corre la app heredando las 3 keys LOCALES, así que el
      # build SERVIDO (.next/server) queda horneado apuntando a 127.0.0.1:54321 (lo
      # verifica el gate de abajo). NUNCA usa --linked → imposible tocar prod. Falla el
      # job si la suite falla (el script propaga el exit code).
      # T-149: invocamos el script DIRECTO (no `pnpm test:e2e:local -- --shard`) para
      # que `--shard=i/3` llegue al argv del orquestador y se forwardee a Playwright;
      # vía `pnpm run … --` el `--` se filtra y Playwright lo leería como filtro de
      # archivos. El reparto es por suma de tests (fullyParallel) → ~34 tests/shard.
      - name: E2E tests (Supabase local efímero) — shard ${{ matrix.shard }}/3
        run: node scripts/test-e2e-local.mjs --shard=${{ matrix.shard }}/3

      # GATE DURO (T-112): probamos que el build SERVIDO quedó horneado apuntando al
      # Supabase LOCAL y NO a prod. Verificado empíricamente (no es obvio):
      #  - NEXT_PUBLIC_SUPABASE_URL NO llega a .next/static. El browser client
      #    (src/shared/supabase/client.ts) es dead code (cero imports); toda la app usa
      #    el server client, así que la URL se inlina en .next/server (lo que sirve
      #    `next start`), no en el bundle del cliente. Por eso grepeamos .next/server.
      #  - Solo .js, NO .js.map: los source maps incluyen el código fuente, y un
      #    comentario en (print)/layout.tsx menciona el project-ref de prod → sin excluir
      #    los maps el negativo daría falso positivo.
      #  - Negativo (garantía real anti-contaminación): el project-ref de PROD
      #    (blijipnixnikaguojjee — público, ya está en ese comentario) NO debe aparecer en
      #    ningún .js servido. Un patrón genérico *.supabase.co NO sirve: el SDK @supabase
      #    trae URLs de ejemplo (example/realtime/xyzcompany.supabase.co) horneadas.
      #  - Positivo: la URL local (:54321) SÍ está en un .js servido.
      # Corre con `always()` porque "tests verdes" NO prueba aislamiento (un build con prod
      # podría correr los E2E contra prod y pasar igual). Si no hubo build, skip benigno
      # (el step E2E ya pintó el job rojo; no hay bundle que inspeccionar).
      - name: Gate horneado — el build servido apunta al Supabase LOCAL
        if: always()
        run: |
          if [ ! -d .next/server ]; then
            echo "::warning::.next/server no existe (el build no se completó); el step E2E ya falló. Skip del gate."
            exit 0
          fi
          if grep -rqF --include='*.js' 'blijipnixnikaguojjee' .next/server; then
            echo "::error::El build servido contiene el project-ref de PROD — NO se aisló, correría contra prod."
            grep -rlF --include='*.js' 'blijipnixnikaguojjee' .next/server | head -5
            exit 1
          fi
          if ! grep -rqE --include='*.js' '(127\.0\.0\.1|localhost):54321' .next/server; then
            echo "::error::El build servido NO contiene la URL del Supabase local (:54321) — el horneado falló o no se aisló."
            exit 1
          fi
          echo "✅ Aislamiento OK: build servido apunta al Supabase local (:54321), sin el project-ref de prod."

      # T-149: cada shard sube su `blob-report/` SIEMPRE (el merge lo necesita aun
      # en verde). Nombre único por shard: upload-artifact v4+ falla si dos jobs
      # suben el mismo nombre. if-no-files-found: ignore → si el build falló y no
      # hubo tests, el step E2E ya pintó rojo y no rompemos por blob vacío.
      - name: Upload blob report (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright test results (videos/screenshots)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  # T-151 (auditoría CI/CD, hallazgo P-1): lint de seguridad de migraciones SQL con
  # squawk. Corre SOLO sobre las migraciones NUEVAS del PR (scripts/lint-migrations.mjs
  # hace `git diff --diff-filter=AM origin/main...HEAD -- supabase/migrations/*.sql`),
  # NUNCA sobre las históricas (ya en prod, inmutables). No-op verde si el PR no toca
  # migraciones. CERO secrets: squawk parsea SQL estático, no toca ninguna DB.
  # fetch-depth:0 es OBLIGATORIO: el diff triple-dot necesita la historia + main para
  # el merge-base (el checkout default es shallow depth=1 y rompería el diff).
  migrations-lint:
    name: Migrations lint (squawk)
    permissions:
      contents: read # T-154 S-1: solo lo que exige actions/checkout
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false # T-155 S-4: zizmor artipacked — verificar en CI que el wrapper SIGA linteando (repo privado: el fallback `git fetch origin main` podría necesitar el token)

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint de migraciones nuevas (squawk)
        run: pnpm lint:migrations

  # T-155 S-4 (auditoría Fase 4): SAST de los propios workflows con zizmor.
  # Detecta template-injection, permisos excesivos, actions sin pinear, artipacked
  # (persistencia de credenciales), cache-poisoning, etc. pipx viene preinstalado en
  # ubuntu-latest → no agrega una action third-party que pinear. zizmor fijado por
  # versión (1.25.2). Los online audits usan github.token (solo lectura). Gating:
  # ci-passed lo incluye en `needs` (abajo).
  workflows-sast:
    name: Workflows SAST (zizmor)
    permissions:
      contents: read # zizmor lee los workflows; online audits via github.token (read)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # T-155 S-4: zizmor artipacked — no persistir el token git

      - name: zizmor (lint de seguridad de los workflows)
        env:
          GH_TOKEN: ${{ github.token }}
        run: pipx run zizmor==1.25.2 .github/workflows/

  # T-149 (Fase 5): dueño único del gate de drift de db:types, extraído de
  # integration-tests. El schema ya migrado debe generar EXACTAMENTE el
  # src/shared/supabase/types.ts committeado. `git diff --exit-code` es read-only:
  # NO commitea, solo falla (mostrando el diff) si difiere → hay que correr
  # `pnpm db:types` y commitear. SIN env block: scripts/gen-types.mjs solo importa
  # node:child_process + node:fs (no toca src/env). Supabase local efímero (--local),
  # cero secrets de prod. T-137: gate y db:types comparten gen-types.mjs (stripea
  # __InternalSupabase / PostgrestVersion); --local acá, --linked en dev → idempotentes
  # pese al skew PostgREST prod 14.5 ↔ local 14.x. T-153: supabase start con retry.
  types-gate:
    name: types.ts drift gate (db:types)
    permissions:
      contents: read # checkout + git diff del working-tree (depth=1 alcanza)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # T-155 S-4: no persistir el token git

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: types.ts sin drift (db:types gate)
        run: |
          node scripts/supabase-start-retry.mjs
          pnpm exec supabase db reset
          node scripts/gen-types.mjs --local
          git diff --exit-code src/shared/supabase/types.ts

  # T-150 (auditoría CI/CD, hallazgo V-2): job paraguas. Está pensado para ser el
  # ÚNICO required check del ruleset de `main` (la transición la hace el owner
  # post-merge, ver docs/sprints/operativo.md T-150). Depende de los jobs reales;
  # renombrar / shardear / agregar jobs detrás de él NO requiere tocar el ruleset.
  ci-passed:
    name: CI passed
    permissions: {} # T-154 S-1: no hace checkout, solo evalúa needs.* → deny-all
    if: always() # corre aunque un upstream falle/cancele, para poder pintarse rojo
    # T-149: el matrix `e2e-tests` aparece UNA vez en needs y agrega las 3 instancias
    # (result == success solo si las 3 pasan). `types-gate` agregado como gate. T-156:
    # `coverage` (gate de cobertura branches+functions) agregado como gate. El job de
    # reporte `e2e-report-merge` NO va acá: es reporte, no debe bloquear el merge.
    needs: [ci, integration-tests, coverage, e2e-tests, types-gate, migrations-lint, workflows-sast]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verificar que todos los jobs requeridos pasaron
        env:
          # Vía env, NO interpolado en el `run` (evita script-injection; patrón GH
          # recomendado). Los valores son controlados, pero el costo es cero.
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Resultados upstream: $RESULTS"
          # Estricto: TODO lo que no sea exactamente "success" es rojo. Cubre
          # failure / cancelled / skipped y cualquier estado futuro desconocido
          # (más seguro que grepear un set fijo de estados malos).
          for r in ${RESULTS//,/ }; do
            if [ "$r" != "success" ]; then
              echo "::error::Algún job requerido no pasó (resultados: $RESULTS)."
              exit 1
            fi
          done
          echo "✅ Todos los jobs requeridos en verde."

  # T-149: consolida los `blob-report-*` de los 3 shards de E2E en un HTML único
  # navegable (`playwright merge-reports`). if: always() → reporta aun con shards
  # rojos. NO está en el needs de ci-passed: es REPORTE, no gate — si el merge falla
  # NO debe bloquear el merge del PR ni pintar el required rojo. contents: read
  # alcanza (artifacts vía Artifact Service, igual que los uploads del E2E).
  e2e-report-merge:
    name: E2E report (merge shards)
    if: always()
    needs: [e2e-tests]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # T-155 S-4: no persistir el token git

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm store cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Junta los blobs de los 3 shards en un solo directorio (merge-multiple).
      - name: Download blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 7

  # NOTA T-022.5: el deploy del CÓDIGO a VPS Hostinger es **automático** (Auto
  # Deploy activado el 2026-06-17): el merge a `main` dispara un webhook
  # GitHub → EasyPanel que rebuildea + redeploya el código sin intervención.
  # NO hay job de deploy en este workflow — el código lo publica el webhook.
  # Las migraciones de Supabase van **aparte** (`db push --linked` manual y
  # diff-validado, T-016), NO auto. Fallback manual: click "Implementar" en
  # EasyPanel UI. Gate: `main` protegida (required checks). Ver
  # `docs/technical/06-deployment.md` y `docs/adr/0007-vps-hostinger-easypanel.md`.
